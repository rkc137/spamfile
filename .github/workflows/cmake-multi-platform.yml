name: CMake cross-platform

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        include:
          - os: windows-latest
            build_type: Release

          - os: ubuntu-latest
            c_compiler: gcc-13
            cpp_compiler: g++-13

          - os: ubuntu-latest
            c_compiler: clang-17
            cpp_compiler: clang++-17

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 13
        if: matrix.cpp_compiler == 'g++-13'
        run: |
          sudo apt update
          sudo apt install -y gcc-13 g++-13

      - name: Install Clang 17
        if: matrix.cpp_compiler == 'clang++-17'
        run: |
          sudo apt update
          sudo apt install -y clang-17 libc++-17-dev libc++abi-17-dev

      - name: Configure (Linux GCC)
        if: matrix.cpp_compiler == 'g++-13'
        run: >
          cmake -B build
          -DCMAKE_C_COMPILER=gcc-13
          -DCMAKE_CXX_COMPILER=g++-13
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -S .
      - name: Configure (Linux Clang + libc++)
        if: matrix.cpp_compiler == 'clang++-17'
        run: >
          cmake -B build
          -DCMAKE_C_COMPILER=clang-17
          -DCMAKE_CXX_COMPILER=clang++-17
          -DCMAKE_CXX_FLAGS="-stdlib=libc++"
          -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++"
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -S .

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }}

      - name: Upload Release Artifact
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: spamfile-release
          path: |
            build/spamfile        # Linux / Mac
            build/spamfile.exe    # Windows